<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recallly 통화 참여</title>
  <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111111;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 24px;
      color: #ffffff;
    }

    .notice-box {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: left;
    }

    .notice-title {
      font-size: 14px;
      font-weight: 600;
      color: #cc4444;
      margin-bottom: 8px;
    }

    .notice-text {
      font-size: 13px;
      line-height: 1.6;
      color: #cccccc;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #ffffff;
      color: #111111;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .btn-primary:hover { background: #eeeeee; }
    .btn-primary:disabled { background: #555; color: #999; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: #888888;
      border: 1px solid #444;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-secondary:hover { color: #cccccc; border-color: #666; }

    /* 통화 중 UI */
    #call-view {
      display: none;
      width: 100%;
      max-width: 400px;
    }

    .recording-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #cc4444;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .rec-dot {
      width: 7px;
      height: 7px;
      background: #ffffff;
      border-radius: 50%;
    }

    .call-info {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      margin-bottom: 16px;
    }

    .call-avatar {
      width: 72px;
      height: 72px;
      background: #333;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 12px;
    }

    .call-status {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .call-timer {
      font-size: 20px;
      font-weight: 600;
      color: #cccccc;
      margin-top: 12px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 16px;
    }

    .ctrl-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
    }

    .ctrl-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .ctrl-circle.end { background: #cc4444; }

    .ctrl-label {
      font-size: 11px;
      color: #888;
    }

    #error-view {
      display: none;
      text-align: center;
      color: #cc4444;
      padding: 24px;
    }
  </style>
</head>
<body>

<!-- 동의 화면 -->
<div class="card" id="consent-view">
  <div class="logo">Recallly</div>

  <div class="notice-box">
    <div class="notice-title">🔴 녹음 고지</div>
    <div class="notice-text">
      이 통화는 <strong>Recallly</strong>에 의해 자동으로 녹음 및 저장됩니다.
      통화에 참여하면 녹음에 동의한 것으로 간주됩니다.
      <br><br>
      녹음 파일은 발신자만 접근할 수 있으며, 법적 분쟁 증거 목적으로 보관될 수 있습니다.
    </div>
  </div>

  <button class="btn-primary" id="join-btn" onclick="joinCall()">동의하고 통화 참여</button>
  <button class="btn-secondary" onclick="declineCall()">거부 (통화 취소)</button>
</div>

<!-- 통화 중 화면 -->
<div id="call-view">
  <div style="display:flex;justify-content:center;margin-bottom:12px;">
    <div class="recording-badge">
      <div class="rec-dot"></div>
      녹음 중
    </div>
  </div>

  <div class="call-info">
    <div class="call-avatar">📞</div>
    <div style="font-size:18px;font-weight:700;">Recallly 통화</div>
    <div class="call-status" id="call-status-text">연결 중...</div>
    <div class="call-timer" id="call-timer">00:00</div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="toggleMute()">
      <div class="ctrl-circle" id="mute-circle">🎤</div>
      <span class="ctrl-label" id="mute-label">음소거</span>
    </button>
    <button class="ctrl-btn" onclick="endCall()">
      <div class="ctrl-circle end">📵</div>
      <span class="ctrl-label">종료</span>
    </button>
  </div>
</div>

<!-- 에러 화면 -->
<div id="error-view">
  <div style="font-size:40px;margin-bottom:12px;">❌</div>
  <div id="error-message">오류가 발생했습니다</div>
</div>

<script>
  // URL 파라미터에서 room, callId, roomUrl 추출
  const params = new URLSearchParams(window.location.search);
  const roomName = params.get('room');
  const callId = params.get('callId');
  const roomUrl = params.get('roomUrl'); // Daily.co WebRTC 룸 URL (예: https://xxx.daily.co/rc-abcd1234)

  let callFrame = null;
  let isMuted = false;
  let timerInterval = null;
  let secondsElapsed = 0;

  // 유효한 파라미터 없으면 에러 표시
  if (!roomName || !roomUrl) {
    showError('잘못된 링크입니다. 발신자에게 새 링크를 요청해주세요.');
  }

  async function joinCall() {
    document.getElementById('join-btn').disabled = true;
    document.getElementById('join-btn').textContent = '연결 중...';

    try {
      callFrame = DailyIframe.createCallObject({
        audioSource: true,
        videoSource: false,
      });

      callFrame.on('joined-meeting', () => {
        showCallView();
        startTimer();
        document.getElementById('call-status-text').textContent = '통화 연결됨';
      });

      callFrame.on('left-meeting', () => {
        stopTimer();
        document.body.innerHTML = `
          <div class="card" style="text-align:center;">
            <div style="font-size:40px;margin-bottom:16px;">✅</div>
            <div style="font-size:18px;font-weight:700;margin-bottom:8px;">통화가 종료되었습니다</div>
            <div style="color:#888;font-size:14px;">이 창을 닫아도 됩니다</div>
          </div>`;
      });

      callFrame.on('error', (e) => {
        showError('통화 연결 오류: ' + (e.errorMsg || '알 수 없는 오류'));
      });

      await callFrame.join({
        url: roomUrl,
        audioSource: true,
        videoSource: false,
      });
    } catch (e) {
      showError('통화 참여 실패: ' + e.message);
    }
  }

  function declineCall() {
    document.getElementById('consent-view').innerHTML = `
      <div style="text-align:center;">
        <div style="font-size:40px;margin-bottom:12px;">🚫</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:8px;">통화를 거부했습니다</div>
        <div style="color:#888;font-size:13px;">이 창을 닫아도 됩니다</div>
      </div>`;
  }

  function toggleMute() {
    if (!callFrame) return;
    isMuted = !isMuted;
    callFrame.setLocalAudio(!isMuted);
    document.getElementById('mute-circle').textContent = isMuted ? '🔇' : '🎤';
    document.getElementById('mute-label').textContent = isMuted ? '해제' : '음소거';
  }

  async function endCall() {
    if (callFrame) await callFrame.leave();
  }

  function showCallView() {
    document.getElementById('consent-view').style.display = 'none';
    document.getElementById('call-view').style.display = 'block';
  }

  function showError(msg) {
    document.getElementById('consent-view').style.display = 'none';
    document.getElementById('call-view').style.display = 'none';
    document.getElementById('error-view').style.display = 'block';
    document.getElementById('error-message').textContent = msg;
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      secondsElapsed++;
      const m = String(Math.floor(secondsElapsed / 60)).padStart(2, '0');
      const s = String(secondsElapsed % 60).padStart(2, '0');
      document.getElementById('call-timer').textContent = `${m}:${s}`;
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
  }
</script>
</body>
</html>
